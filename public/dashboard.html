<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguardia | Centro de Comando V11</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent-color: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #f3f4f6; overflow-x: hidden; }
        .ambient-bg { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, var(--accent-color) 0%, transparent 60%); opacity: 0.08; pointer-events: none; z-index: -1; transition: all 1s ease; }
        .glass-card { background: rgba(10, 10, 10, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); }
        
        /* Modal de Pre-Vuelo */
        #modalPreVuelo { background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); display: flex; }
        
        /* HUD de Batalla */
        #hudBatalla { display: none; background: rgba(0,0,0,0.9); z-index: 100; border: 2px solid var(--accent-color); }
        .recording-pulse { animation: pulseHUD 1s infinite; }
        @keyframes pulseHUD { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .sensor { transition: fill 0.8s ease; fill: rgba(255,255,255,0.05); }
        .sensor.glow-blue { fill: #3b82f6; filter: drop-shadow(0 0 10px #3b82f6); }
        .sensor.glow-purple { fill: #a855f7; filter: drop-shadow(0 0 15px #a855f7); }
        .sensor.glow-red { fill: #ef4444; filter: drop-shadow(0 0 20px #ef4444); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .locked-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 50; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .is-locked .locked-overlay { display: flex; }
        .vista { display: none; animation: fadeIn 0.5s ease forwards; }
        .vista.activa { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="ambient" class="ambient-bg"></div>

    <div id="modalPreVuelo" class="fixed inset-0 z-[200] items-center justify-center p-6">
        <div class="glass-card w-full max-w-sm p-8 rounded-3xl border border-blue-500/30 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-blue-500 shadow-[0_0_15px_#3b82f6]"></div>
            <h2 class="text-xs font-black tracking-[0.4em] uppercase text-white mb-6 text-center">Check-in de Preparación SNC</h2>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] uppercase text-gray-500 tracking-widest block mb-2 text-center">Horas de Sueño</label>
                    <input type="number" id="inputSueño" placeholder="7" class="w-full bg-black border border-white/10 rounded-lg p-3 text-center text-xl text-blue-400 outline-none">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-gray-500 tracking-widest block mb-2 text-center">Nivel de Estrés Sistémico (1-10)</label>
                    <input type="range" id="inputEstres" min="1" max="10" value="3" class="w-full accent-blue-500">
                    <div class="flex justify-between text-[10px] text-gray-600 mt-1 uppercase"><span>Calma</span><span>Caos</span></div>
                </div>
                <button onclick="finalizarCheckIn()" class="w-full py-4 bg-white text-black font-black uppercase tracking-widest text-[10px] rounded-xl hover:bg-blue-50 transition-all">Iniciar Secuencia</button>
            </div>
        </div>
    </div>

    <div id="hudBatalla" class="fixed inset-4 rounded-3xl flex-col items-center justify-center text-center p-6">
        <div class="text-[10px] text-blue-500 font-bold tracking-[0.5em] uppercase mb-4 recording-pulse">Escaneando Tensión Mecánica</div>
        <div id="relojHUD" class="text-8xl font-black text-white mb-8 tracking-tighter">00<span class="text-blue-500">s</span></div>
        <button onclick="detenerHUD()" class="px-12 py-6 bg-red-600 text-white font-black uppercase tracking-[0.3em] rounded-full text-sm shadow-[0_0_30px_rgba(220,38,38,0.5)]">Finalizar Serie (Fallo)</button>
    </div>

    <nav class="p-4 flex justify-between items-center border-b border-white/5 relative z-10 bg-black/50 backdrop-blur-md sticky top-0">
        <div class="text-lg font-black tracking-tighter uppercase">Vanguardia.</div>
        <button onclick="toggleVista()" id="btnVista" class="text-[10px] bg-white text-black font-bold uppercase tracking-widest px-3 py-1 rounded">Modo Macro</button>
    </nav>

    <main class="max-w-7xl mx-auto p-4 space-y-6">

        <div id="vistaMicro" class="vista activa space-y-6">
            
            <div class="glass-card p-6 rounded-2xl border-l-4" id="panelDirectriz">
                <h2 class="text-[10px] font-bold tracking-[0.2em] text-white uppercase mb-2 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-white animate-pulse" id="dotDirectriz"></span> Directriz Operativa
                </h2>
                <div id="textoDirectriz" class="text-sm text-gray-300 font-light mt-4 italic">Analizando readiness...</div>
            </div>

            <div class="glass-card p-5 rounded-2xl border-l-2 border-l-blue-500">
                <h2 class="text-[10px] font-bold tracking-[0.2em] text-gray-500 uppercase mb-3">Identidad Biométrica</h2>
                <div class="grid grid-cols-3 gap-3">
                    <div><label class="block text-[9px] text-gray-600 uppercase mb-1">Edad</label><input type="number" id="bioEdad" value="41" class="w-full bg-black/50 border border-white/10 rounded p-2 text-white text-center outline-none"></div>
                    <div><label class="block text-[9px] text-gray-600 uppercase mb-1">Estatura</label><input type="number" id="bioEstatura" value="169" class="w-full bg-black/50 border border-white/10 rounded p-2 text-white text-center outline-none"></div>
                    <div><label class="block text-[9px] text-gray-600 uppercase mb-1">Peso (Kg)</label><input type="number" id="bioPeso" value="85" class="w-full bg-black/50 border border-white/10 rounded p-2 text-white text-center outline-none text-blue-400 font-bold"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 relative">
                <div class="lg:col-span-5 glass-card p-5 rounded-2xl relative" id="panelIngreso">
                    <form id="formVanguardia" class="space-y-5">
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-widest text-gray-400">Patrón de Movimiento</label>
                            <select id="ejercicioSelector" class="w-full bg-black/50 border border-white/10 rounded-lg p-3 text-white text-sm outline-none">
                                <option value="Sentadilla">Sentadilla Libre</option><option value="Prensa">Prensa de Piernas</option><option value="Peso Muerto">Peso Muerto</option><option value="Press Banca">Press de Banca</option><option value="Dominadas">Dominadas</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[10px] uppercase tracking-widest text-gray-400">Carga (Kg)</label><input type="number" id="carga" required class="w-full bg-transparent border-b border-white/20 py-2 text-xl text-center text-white outline-none"></div>
                            <div class="relative">
                                <label class="text-[10px] uppercase tracking-widest text-gray-400">TUT (Seg)</label>
                                <input type="number" id="tut" required class="w-full bg-transparent border-b border-white/20 py-2 text-xl text-center text-white outline-none">
                                <button type="button" onclick="iniciarHUD()" class="absolute -bottom-6 right-0 text-[8px] bg-blue-600 text-white px-2 py-1 rounded uppercase font-bold tracking-widest">▶ Iniciar HUD</button>
                            </div>
                        </div>
                        <div class="pt-4">
                            <div class="flex justify-between mb-1"><label class="text-[10px] uppercase tracking-widest text-red-400">RPE (Fallo)</label><span id="rpeVal" class="text-sm font-bold text-red-500">5/10</span></div>
                            <input type="range" id="rpe" min="1" max="10" value="5" class="w-full h-1 bg-gray-800 rounded-lg appearance-none">
                        </div>
                        <button type="submit" class="w-full py-4 bg-white text-black font-black uppercase tracking-widest text-[10px] rounded hover:bg-blue-50">Computar Impacto</button>
                    </form>
                </div>

                <div class="lg:col-span-7 flex flex-col gap-6">
                    <div class="glass-card p-4 rounded-2xl flex justify-center items-center h-48 relative">
                        <svg viewBox="0 0 200 400" class="h-64 w-auto opacity-70">
                            <path d="M100,20 C110,20 120,30 120,45 C120,60 110,70 100,70 C90,70 80,60 80,45 C80,30 90,20 100,20 Z" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
                            <path d="M70,75 L130,75 L145,150 L55,150 Z" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
                            <path d="M55,75 L30,170 L20,240 M145,75 L170,170 L180,240" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
                            <path d="M75,150 L60,280 L55,380 M125,150 L140,280 L145,380" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
                            <circle id="sensor-pecho" cx="100" cy="100" r="15" class="sensor"/><circle id="sensor-espalda" cx="100" cy="125" r="20" class="sensor"/><circle id="sensor-piernas1" cx="68" cy="210" r="18" class="sensor"/><circle id="sensor-piernas2" cx="132" cy="210" r="18" class="sensor"/><circle id="sensor-cadenaPost1" cx="60" cy="280" r="12" class="sensor"/><circle id="sensor-cadenaPost2" cx="140" cy="280" r="12" class="sensor"/>
                        </svg>
                    </div>
                    <div class="glass-card p-5 rounded-2xl flex-grow">
                        <h2 class="text-[10px] font-bold tracking-[0.2em] text-gray-500 uppercase mb-3 border-b border-white/5 pb-2">Diagnóstico Biológico</h2>
                        <div id="bioInsight" class="text-xs font-light text-gray-300">...</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="vistaMacro" class="vista space-y-6">
            <div class="glass-card p-4 rounded-2xl h-80 relative"><canvas id="macroChart"></canvas></div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="extraerDatos('csv')" class="glass-card p-4 rounded-xl text-[10px] uppercase tracking-widest text-green-400">CSV</button>
                <button onclick="sellarBoveda()" class="bg-red-900/20 border border-red-500/30 p-4 rounded-xl text-[10px] uppercase tracking-widest text-red-500">Sellar .VAN</button>
            </div>
        </div>

    </main>

    <script>
        // --- 1. MOTOR SENSORIAL ---
        const AudioContext = window.AudioContext || window.webkitAudioContext; let audioCtx;
        const TacticoSensorial = {
            init: function() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); },
            vibrar: function(p) { if (navigator.vibrate) navigator.vibrate(p); },
            tick: function() { this.init(); this.vibrar(15); },
            alarma: function() { this.init(); this.vibrar([100, 50, 200]); }
        };

        // --- 2. LÓGICA DE PRE-VUELO (READINESS) ---
        let bioData = { sueno: 7, estres: 3 };
        function finalizarCheckIn() {
            TacticoSensorial.init();
            bioData.sueno = parseFloat(document.getElementById('inputSueño').value) || 7;
            bioData.estres = parseFloat(document.getElementById('inputEstres').value) || 3;
            document.getElementById('modalPreVuelo').style.display = 'none';
            evaluarEstadoDiario();
        }

        // --- 3. HUD DE BATALLA (CHRONO) ---
        let timerInterval; let seg = 0;
        function iniciarHUD() {
            TacticoSensorial.init();
            document.getElementById('hudBatalla').style.display = 'flex';
            seg = 0;
            timerInterval = setInterval(() => {
                seg++;
                document.getElementById('relojHUD').innerHTML = `${seg}<span class="text-blue-500 text-4xl">s</span>`;
                TacticoSensorial.tick(); // Vibra cada segundo
            }, 1000);
        }
        function detenerHUD() {
            clearInterval(timerInterval);
            document.getElementById('tut').value = seg;
            document.getElementById('hudBatalla').style.display = 'none';
            TacticoSensorial.vibrar([50, 100, 50]);
        }

        // --- 4. MOTOR LÓGICO V11 ---
        let historialSeries = JSON.parse(localStorage.getItem('vanguardia_data_v11')) || [];

        function evaluarEstadoDiario() {
            const panel = document.getElementById('panelDirectriz');
            const texto = document.getElementById('textoDirectriz');
            
            // Penalización por Sueño y Estrés
            let readinessScore = 100;
            if (bioData.sueno < 7) readinessScore -= (7 - bioData.sueno) * 15;
            if (bioData.estres > 6) readinessScore -= (bioData.estres - 6) * 10;

            if (readinessScore < 60) {
                panel.className = "glass-card p-6 rounded-2xl border-l-4 border-red-500";
                texto.innerHTML = `<strong class="text-red-500 text-sm block mb-1">ALERTA: CAPACIDAD ADAPTATIVA BAJA (${readinessScore}%)</strong>Tu SNC está comprometido por falta de sueño o estrés sistémico. El riesgo de lesión fascial se multiplica. <br><span class="text-white">Prescripción: Prohibido RPE 10. Limítate a RPE 7 (Mantenimiento).</span>`;
            } else {
                panel.className = "glass-card p-6 rounded-2xl border-l-4 border-blue-500";
                texto.innerHTML = `<strong class="text-blue-400 text-sm block mb-1">SISTEMA LISTO (${readinessScore}%)</strong>Entorno hormonal favorable. Autorización para buscar tensión mecánica máxima.`;
            }
        }

        document.getElementById('rpe').oninput = function() { document.getElementById('rpeVal').innerText = this.value + '/10'; TacticoSensorial.tick(); };

        document.getElementById('formVanguardia').onsubmit = function(e) {
            e.preventDefault();
            const carga = parseFloat(document.getElementById('carga').value);
            const tut = parseFloat(document.getElementById('tut').value);
            const rpe = parseFloat(document.getElementById('rpe').value);
            const peso = parseFloat(document.getElementById('bioPeso').value) || 85;

            // EL ALGORITMO AHORA PENALIZA POR READINESS
            let factorCastigo = (bioData.sueno < 6) ? 1.5 : 1.0;
            let riesgo = (((carga/peso)*2) + (rpe*0.5) + (tut/60)) * factorCastigo;
            
            const ts = new Date().getTime();
            historialSeries.push({ timestampNum: ts, ejercicio: document.getElementById('ejercicioSelector').value, carga, tut, rpe, riesgo: riesgo.toFixed(1) });
            localStorage.setItem('vanguardia_data_v11', JSON.stringify(historialSeries));

            let diag = "";
            if (riesgo > 8.5) {
                diag = `<span class="text-red-500 font-bold">RIESGO CRÍTICO.</span> Tu falta de descanso (${bioData.sueno}h) eleva el riesgo a ${riesgo.toFixed(1)}. Detén la sesión.`;
                TacticoSensorial.alarma();
            } else {
                diag = `<span class="text-purple-400 font-bold">ESTÍMULO CORRECTO.</span> Riesgo calculado: ${riesgo.toFixed(1)}.`;
                TacticoSensorial.vibrar([30, 50, 30]);
            }
            document.getElementById('bioInsight').innerHTML = diag;
        };

        function toggleVista() {
            document.getElementById('vistaMicro').classList.toggle('activa');
            document.getElementById('vistaMacro').classList.toggle('activa');
        }
    </script>
</body>
</html>
