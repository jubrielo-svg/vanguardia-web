<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguardia | Consola Móvil</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent-color: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #f3f4f6; overflow-x: hidden; }
        .ambient-bg { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, var(--accent-color) 0%, transparent 60%); opacity: 0.08; pointer-events: none; z-index: -1; transition: all 1s ease; }
        .glass-card { background: rgba(10, 10, 10, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); }
        select { -webkit-appearance: none; appearance: none; background: url('data:image/svg+xml;utf8,<svg fill="white" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>') no-repeat right 10px center; }
        .sensor { transition: fill 0.8s ease; fill: rgba(255,255,255,0.05); }
        .sensor.glow-blue { fill: #3b82f6; filter: drop-shadow(0 0 10px #3b82f6); }
        .sensor.glow-purple { fill: #a855f7; filter: drop-shadow(0 0 15px #a855f7); }
        .sensor.glow-red { fill: #ef4444; filter: drop-shadow(0 0 20px #ef4444); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .locked-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 50; display: none; flex-direction: column; justify-content: center; align-items: center; border: 1px solid rgba(239, 68, 68, 0.3); }
        .is-locked .locked-overlay { display: flex; }
        
        /* Transiciones de Vista */
        .vista { display: none; animation: fadeIn 0.5s ease forwards; }
        .vista.activa { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="ambient" class="ambient-bg"></div>

    <nav class="p-4 flex justify-between items-center border-b border-white/5 relative z-10 bg-black/50 backdrop-blur-md sticky top-0">
        <div class="text-lg font-black tracking-tighter uppercase">Vanguardia.</div>
        <div class="flex gap-2">
            <button onclick="toggleVista()" id="btnVista" class="text-[10px] bg-white text-black font-bold uppercase tracking-widest px-3 py-1 rounded shadow-[0_0_10px_rgba(255,255,255,0.3)]">Modo Macro (Vulcano)</button>
            <button onclick="localStorage.clear(); location.reload();" class="text-[10px] text-red-500 hover:text-white uppercase tracking-widest border border-red-500/20 px-2 py-1 rounded">Purgar</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 relative">

        <div id="vistaMicro" class="vista activa space-y-6">
            
            <div class="glass-card p-5 rounded-2xl border-l-2 border-l-blue-500">
                <h2 class="text-[10px] font-bold tracking-[0.2em] text-gray-500 uppercase mb-3">Identidad Biométrica</h2>
                <div class="grid grid-cols-3 gap-3">
                    <div><label class="block text-[9px] text-gray-600 uppercase mb-1">Edad</label><input type="number" id="bioEdad" required placeholder="30" class="w-full bg-black/50 border border-white/10 rounded p-2 text-white text-center focus:border-blue-500 outline-none"></div>
                    <div><label class="block text-[9px] text-gray-600 uppercase mb-1">Altura</label><input type="number" id="bioEstatura" required placeholder="175" class="w-full bg-black/50 border border-white/10 rounded p-2 text-white text-center focus:border-blue-500 outline-none"></div>
                    <div><label class="block text-[9px] text-gray-600 uppercase mb-1">Peso (Kg)</label><input type="number" id="bioPeso" required placeholder="80" class="w-full bg-black/50 border border-white/10 rounded p-2 text-white text-center focus:border-blue-500 outline-none"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 relative">
                <div class="lg:col-span-5 glass-card p-5 rounded-2xl relative" id="panelIngreso">
                    <div class="locked-overlay text-center p-4 rounded-2xl">
                        <span class="text-red-500 text-2xl mb-2">⚠️</span>
                        <h3 class="text-white font-bold tracking-widest uppercase text-xs mb-2">Bloqueo Táctico</h3>
                        <div id="relojRecuperacion" class="text-xl font-mono text-red-500 tracking-widest mt-2">00:00:00</div>
                    </div>

                    <form id="formVanguardia" class="space-y-5">
                        <div>
                            <label class="text-[10px] uppercase tracking-widest text-gray-400">Patrón de Movimiento</label>
                            <select id="ejercicioSelector" class="w-full bg-black/50 border border-white/10 rounded-lg p-3 mt-1 text-white text-sm outline-none cursor-pointer">
                                <option value="Sentadilla">Sentadilla Libre</option><option value="Prensa">Prensa de Piernas</option><option value="Peso Muerto">Peso Muerto</option><option value="Press Banca">Press de Banca</option><option value="Dominadas">Dominadas</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[10px] uppercase tracking-widest text-gray-400">Carga (Kg)</label><input type="number" id="carga" required class="w-full bg-transparent border-b border-white/20 py-2 text-xl text-center outline-none text-white focus:border-blue-500"></div>
                            <div><label class="text-[10px] uppercase tracking-widest text-gray-400">TUT (Seg)</label><input type="number" id="tut" required class="w-full bg-transparent border-b border-white/20 py-2 text-xl text-center outline-none text-white focus:border-purple-400"></div>
                        </div>
                        <div>
                            <div class="flex justify-between mb-1"><label class="text-[10px] uppercase tracking-widest text-red-400">Fatiga Central (RPE)</label><span id="rpeVal" class="text-sm font-bold text-red-500">5/10</span></div>
                            <input type="range" id="rpe" min="1" max="10" value="5" class="w-full h-1 bg-gray-800 rounded-lg appearance-none">
                        </div>
                        <button type="submit" class="w-full py-4 bg-white text-black font-black uppercase tracking-[0.2em] text-[10px] rounded">Generar Diagnóstico</button>
                    </form>
                </div>

                <div class="lg:col-span-7 flex flex-col gap-6">
                    <div class="glass-card p-4 rounded-2xl flex justify-center items-center h-48 relative overflow-hidden">
                        <svg viewBox="0 0 200 400" class="h-64 w-auto opacity-70">
                            <path d="M100,20 C110,20 120,30 120,45 C120,60 110,70 100,70 C90,70 80,60 80,45 C80,30 90,20 100,20 Z" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
                            <path d="M70,75 L130,75 L145,150 L55,150 Z" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
                            <path d="M55,75 L30,170 L20,240 M145,75 L170,170 L180,240" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
                            <path d="M75,150 L60,280 L55,380 M125,150 L140,280 L145,380" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
                            <circle id="sensor-pecho" cx="100" cy="100" r="15" class="sensor"/><circle id="sensor-espalda" cx="100" cy="125" r="20" class="sensor"/><circle id="sensor-piernas1" cx="68" cy="210" r="18" class="sensor"/><circle id="sensor-piernas2" cx="132" cy="210" r="18" class="sensor"/><circle id="sensor-cadenaPost1" cx="60" cy="280" r="12" class="sensor"/><circle id="sensor-cadenaPost2" cx="140" cy="280" r="12" class="sensor"/>
                        </svg>
                    </div>
                    <div class="glass-card p-5 rounded-2xl flex-grow">
                        <h2 class="text-[10px] font-bold tracking-[0.2em] text-gray-500 uppercase mb-3 border-b border-white/5 pb-2">Prescripción Biológica</h2>
                        <div id="bioInsight" class="text-xs font-light leading-relaxed text-gray-300">Completa tu biometría y registra carga para generar rutina.</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="vistaMacro" class="vista space-y-6">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-black text-white uppercase tracking-widest">NÚCLEO <span class="text-blue-500">/</span> Vulcano OS</h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Telemetría de Macro-Ciclo</p>
            </div>

            <div class="glass-card p-4 rounded-2xl">
                <h2 class="text-[10px] font-bold tracking-[0.2em] text-gray-400 uppercase mb-4">Evolución: Estrés Mecánico vs. Fatiga Central</h2>
                <div class="w-full h-80 relative">
                    <canvas id="macroChart"></canvas>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="TacticoSensorial.computar(); extraerDatos('csv')" class="glass-card p-4 rounded-xl text-[10px] uppercase tracking-widest text-green-400 border border-green-500/30 hover:bg-green-900/20">↓ Extraer a Excel (CSV)</button>
                <button onclick="TacticoSensorial.computar(); extraerDatos('json')" class="glass-card p-4 rounded-xl text-[10px] uppercase tracking-widest text-blue-400 border border-blue-500/30 hover:bg-blue-900/20">↓ Puente Vulcano (JSON)</button>
            </div>
        </div>

    </main>

    <script>
        // --- MOTOR HÁPTICO (Reducido para espacio) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext; let audioCtx;
        const TacticoSensorial = {
            init: function() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); },
            vibrar: function(patron) { if (navigator.vibrate) navigator.vibrate(patron); },
            tick: function() { this.init(); this.vibrar(15); },
            computar: function() { this.init(); this.vibrar([30, 50, 30]); },
            alarma: function() { this.init(); this.vibrar([100, 50, 100, 50, 200]); }
        };

        // --- LÓGICA DE VISTAS (El Interruptor) ---
        let vistaActual = 'micro';
        function toggleVista() {
            TacticoSensorial.tick();
            const vMicro = document.getElementById('vistaMicro');
            const vMacro = document.getElementById('vistaMacro');
            const btn = document.getElementById('btnVista');

            if (vistaActual === 'micro') {
                vMicro.classList.remove('activa'); vMacro.classList.add('activa');
                btn.innerText = "Volver a Sesión (Micro)";
                btn.className = "text-[10px] bg-transparent text-white border border-white/20 font-bold uppercase tracking-widest px-3 py-1 rounded";
                document.documentElement.style.setProperty('--accent-color', '#10b981'); // Verde Vulcano
                renderizarMacroChart();
                vistaActual = 'macro';
            } else {
                vMacro.classList.remove('activa'); vMicro.classList.add('activa');
                btn.innerText = "Modo Macro (Vulcano)";
                btn.className = "text-[10px] bg-white text-black font-bold uppercase tracking-widest px-3 py-1 rounded shadow-[0_0_10px_rgba(255,255,255,0.3)]";
                document.documentElement.style.setProperty('--accent-color', '#3b82f6');
                vistaActual = 'micro';
            }
        }

        // --- SISTEMA DE DATOS Y ALMACENAMIENTO ---
        let historialSeries = JSON.parse(localStorage.getItem('vanguardia_data_v8')) || [];
        
        // Formulario Micro-Ciclo
        document.getElementById('rpe').oninput = function() { document.getElementById('rpeVal').innerText = this.value + '/10'; TacticoSensorial.tick(); };
        const anatomia = { "Sentadilla": ["sensor-piernas1", "sensor-piernas2"], "Prensa": ["sensor-piernas1", "sensor-piernas2"], "Peso Muerto": ["sensor-cadenaPost1", "sensor-cadenaPost2", "sensor-espalda"], "Press Banca": ["sensor-pecho"], "Dominadas": ["sensor-espalda"] };
        const tips = { "Sentadilla": "Fase excéntrica de 3s.", "Peso Muerto": "Carga axial. Mantén neutralidad.", "Prensa": "Controla el rebote inferior.", "Press Banca": "Retracción escapular.", "Dominadas": "Tracción estricta." };

        document.getElementById('formVanguardia').onsubmit = function(e) {
            e.preventDefault();
            const peso = parseFloat(document.getElementById('bioPeso').value);
            const edad = parseFloat(document.getElementById('bioEdad').value);
            const ej = document.getElementById('ejercicioSelector').value;
            const carga = parseFloat(document.getElementById('carga').value);
            const tut = parseFloat(document.getElementById('tut').value);
            const rpe = parseFloat(document.getElementById('rpe').value);
            if(!peso || !edad) return alert("Completa la biometría.");

            const cargaRelativa = carga / peso; 
            const factorEdad = edad > 35 ? (edad - 35) * 0.05 : 0; 
            const ifi = ((carga / 100) * (tut / 50)).toFixed(2);
            let riesgo = ((cargaRelativa * 2) + (rpe * 0.5) + (tut/60) + factorEdad).toFixed(1);

            // NUEVO: Guardar con Fecha y Hora exacta (Timestamp)
            const timestamp = new Date().toISOString();
            const fechaCorta = new Date().toLocaleDateString('es-ES', { day: '2-digit', month: 'short', hour: '2-digit', minute:'2-digit' });

            const nuevaSerie = { fechaStr: fechaCorta, timestamp: timestamp, ejercicio: ej, carga, tut, rpe, ifi: parseFloat(ifi), riesgo: parseFloat(riesgo) };
            historialSeries.push(nuevaSerie);
            localStorage.setItem('vanguardia_data_v8', JSON.stringify(historialSeries));

            let diag = ""; let c = "";
            if(riesgo < 5) { c = "glow-blue"; diag = `<span class="text-blue-400 font-bold block mb-1">INFRADOSIS</span><div class="text-[10px] mt-2 text-gray-400">${tips[ej]}<br>Sube el RPE.</div>`; TacticoSensorial.computar(); } 
            else if(riesgo < 8) { c = "glow-purple"; diag = `<span class="text-purple-400 font-bold block mb-1">HIPERTROFIA ÓPTIMA</span><div class="text-[10px] mt-2 text-gray-400">${tips[ej]}<br>Descanso requerido.</div>`; TacticoSensorial.computar(); } 
            else { c = "glow-red"; diag = `<span class="text-red-500 font-bold block mb-1">DAÑO FASCIAL</span><div class="text-[10px] mt-2 text-red-400">Descanso severo mandatorio.</div>`; TacticoSensorial.alarma(); }
            
            document.getElementById('bioInsight').innerHTML = diag;
            document.querySelectorAll('.sensor').forEach(s => s.className.baseVal = "sensor");
            (anatomia[ej] || []).forEach(id => document.getElementById(id).className.baseVal = `sensor ${c}`);
        };

        // --- GRÁFICA MACRO (VULCANO) ---
        let macroChartInstance = null;
        function renderizarMacroChart() {
            const ctx = document.getElementById('macroChart').getContext('2d');
            
            // Extraer últimos 20 registros
            const dataSlice = historialSeries.slice(-20);
            const labels = dataSlice.map(s => s.ejercicio.substring(0,3) + ' ' + s.fechaStr.split(',')[0]);
            const dataIFI = dataSlice.map(s => s.ifi);
            const dataRPE = dataSlice.map(s => s.rpe);

            if(macroChartInstance) macroChartInstance.destroy();

            Chart.defaults.color = '#6b7280';
            Chart.defaults.font.family = 'Inter';

            macroChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { type: 'line', label: 'Fatiga (RPE)', data: dataRPE, borderColor: '#ef4444', backgroundColor: '#ef4444', borderWidth: 2, tension: 0.4, yAxisID: 'y1' },
                        { type: 'bar', label: 'Tensión (IFI)', data: dataIFI, backgroundColor: 'rgba(168, 85, 247, 0.4)', borderColor: '#a855f7', borderWidth: 1, borderRadius: 4, yAxisID: 'y' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { size: 9 } } },
                        y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Factor IFI', font:{size:9} }, grid: { color: 'rgba(255,255,255,0.05)' } },
                        y1: { type: 'linear', display: true, position: 'right', title: { display: true, text: 'Nivel RPE', font:{size:9} }, min: 0, max: 10, grid: { display: false } }
                    },
                    plugins: { legend: { position: 'top', labels: { boxWidth: 10, font: { size: 10 } } } }
                }
            });
        }

        // --- EXPORTACIÓN VULCANO ---
        function extraerDatos(formato) {
            if(historialSeries.length === 0) return alert("Bóveda vacía.");
            let contenido = ""; let mime = ""; let nombre = "";

            if(formato === 'csv') {
                contenido = "Fecha,Timestamp,Ejercicio,Carga,TUT,RPE,IFI,Riesgo\n";
                historialSeries.forEach(s => contenido += `"${s.fechaStr}","${s.timestamp}","${s.ejercicio}",${s.carga},${s.tut},${s.rpe},${s.ifi},${s.riesgo}\n`);
                mime = 'text/csv'; nombre = 'Vanguardia_Macro_Data.csv';
            } else if (formato === 'json') {
                contenido = JSON.stringify({ "usuario_id": "elite_01", "sistema": "Vanguardia V8", "destino": "Vulcano OS", "registros": historialSeries }, null, 2);
                mime = 'application/json'; nombre = 'Vulcano_Bridge_Data.json';
            }

            const blob = new Blob([contenido], { type: mime });
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(blob); a.download = nombre; a.click();
        }
    </script>
</body>
</html>
