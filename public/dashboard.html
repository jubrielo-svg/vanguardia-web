<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguardia | Consola Biométrica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent-color: #3b82f6; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000; 
            color: #f3f4f6; 
            transition: background 1.5s ease;
        }
        /* El "Aura" de la aplicación */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, var(--accent-color) 0%, transparent 70%);
            opacity: 0.05;
            pointer-events: none;
            z-index: -1;
            transition: all 1.5s ease;
        }
        .glass-card { 
            background: rgba(10, 10, 10, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
        }
        #alertaCritica { display: none; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); }
        #alertaCritica.activa { display: flex; animation: scanline 4s linear infinite; }
        @keyframes scanline { 0% { box-shadow: inset 0 0 100px rgba(220, 38, 38, 0.2); } 50% { box-shadow: inset 0 0 200px rgba(220, 38, 38, 0.5); } 100% { box-shadow: inset 0 0 100px rgba(220, 38, 38, 0.2); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="ambient" class="ambient-bg"></div>

    <script>
        if (localStorage.getItem('vanguardia_auth') !== 'true') { window.location.href = 'login.html'; }
        function logout() { localStorage.removeItem('vanguardia_auth'); window.location.href = 'index.html'; }
    </script>

    <div id="alertaCritica" class="fixed inset-0 z-[100] flex-col items-center justify-center text-center p-6 border-4 border-red-600/20">
        <div class="max-w-xl">
            <h1 class="text-7xl font-black text-red-600 mb-4 tracking-tighter">STOP.</h1>
            <h2 class="text-2xl font-bold text-white mb-6 uppercase tracking-widest">Inferencia de Lesión Detectada</h2>
            <p id="mensajeAlerta" class="text-gray-400 text-lg mb-10 font-light"></p>
            <button onclick="document.getElementById('alertaCritica').classList.remove('activa')" class="border border-white/20 px-10 py-4 text-white hover:bg-white hover:text-black transition-all uppercase text-xs tracking-widest">Entendido</button>
        </div>
    </div>

    <nav class="p-6 flex justify-between items-center border-b border-white/5">
        <div class="text-xl font-black tracking-tighter uppercase">Vanguardia.</div>
        <div class="flex items-center gap-6">
            <button onclick="descargarBoveda()" class="text-[10px] border border-white/10 px-3 py-1 rounded-full hover:bg-white hover:text-black transition-all uppercase tracking-widest">Extraer Telemetría</button>
            <button onclick="logout()" class="text-[10px] text-gray-600 hover:text-white uppercase tracking-widest">Salir</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div class="lg:col-span-2 glass-card p-8 rounded-3xl">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-xs font-bold tracking-[0.3em] text-gray-500 uppercase">Ingreso Biomecánico</h2>
                    <span id="reloj" class="text-blue-500 font-mono">00:00:00</span>
                </div>
                
                <form id="formVanguardia" class="space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-widest text-gray-600">Patrón de Movimiento</label>
                            <input type="text" id="ejercicio" required placeholder="Prensa / Sentadilla" class="w-full bg-transparent border-b border-white/10 py-3 text-xl focus:border-blue-500 outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-widest text-gray-600">Carga Absoluta (Kg)</label>
                            <input type="number" id="carga" required class="w-full bg-transparent border-b border-white/10 py-3 text-xl focus:border-blue-500 outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-widest text-gray-600">TUT Real (Seg)</label>
                            <input type="number" id="tut" required class="w-full bg-transparent border-b border-white/10 py-3 text-xl focus:border-blue-500 outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-widest text-gray-600">Fatiga Central (RPE)</label>
                            <div class="flex items-center gap-4">
                                <input type="range" id="rpe" min="1" max="10" value="5" class="flex-grow accent-white">
                                <span id="rpeVal" class="text-xl font-bold w-8 text-center">5</span>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="w-full py-5 bg-white text-black font-black uppercase tracking-[0.4em] text-xs hover:tracking-[0.6em] transition-all">Computar Sistema</button>
                </form>
            </div>

            <div class="lg:col-span-2 glass-card p-8 rounded-3xl flex flex-col justify-between">
                <div>
                    <h2 class="text-xs font-bold tracking-[0.3em] text-gray-500 uppercase mb-6">Diagnóstico Simbiótico</h2>
                    <div id="bioInsight" class="text-2xl font-light leading-snug text-gray-300 italic">
                        Esperando datos para iniciar análisis de supercompensación...
                    </div>
                </div>
                <div class="h-40 w-full mt-6">
                    <canvas id="miniChart"></canvas>
                </div>
            </div>

        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6">
            <div class="glass-card p-6 rounded-3xl flex items-center justify-center h-80">
                <canvas id="radarRisk"></canvas>
            </div>
            <div class="md:col-span-2 glass-card p-6 rounded-3xl overflow-hidden flex flex-col h-80">
                <h2 class="text-xs font-bold tracking-[0.3em] text-gray-500 uppercase mb-4">Bitácora de Riesgo</h2>
                <div id="listaSeries" class="flex-grow overflow-y-auto space-y-4 pr-2 text-sm">
                    </div>
            </div>
        </div>

    </main>

    <script>
        // CONFIGURACIÓN DE GRÁFICAS
        const ctxRadar = document.getElementById('radarRisk').getContext('2d');
        const radar = new Chart(ctxRadar, {
            type: 'radar',
            data: {
                labels: ['IFI', 'RPE', 'TUT', 'RIESGO'],
                datasets: [{ data: [0,0,0,0], backgroundColor: 'rgba(255,255,255,0.05)', borderColor: '#fff', borderWidth: 1, pointRadius: 0 }]
            },
            options: { scales: { r: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { display: false }, pointLabels: { color: '#666', font: { size: 9 } } } }, plugins: { legend: { display: false } } }
        });

        const ctxLine = document.getElementById('miniChart').getContext('2d');
        const line = new Chart(ctxLine, {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#3b82f6', tension: 0.4, borderWidth: 2, pointRadius: 0, fill: false }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } }
        });

        // LÓGICA DE VIDA
        let historial = JSON.parse(localStorage.getItem('vanguardia_series')) || [];

        const insights = {
            bajo: "Estímulo insuficiente. Tu sistema nervioso ni siquiera ha registrado la carga. Sube la tensión mecánica.",
            optimo: "Zona de Hipertrofia Óptima. La supercompensación será profunda. Mantén este ratio.",
            peligro: "Fatiga sistémica detectada. El músculo está rompiendo, pero el sistema nervioso está colapsando. Cuidado.",
            critico: "CRÍTICO. No estás entrenando, estás destruyendo tejido fascial. El riesgo de desgarro es inminente."
        };

        function actualizarIU(serie) {
            const insightBox = document.getElementById('bioInsight');
            const ambient = document.getElementById('ambient');
            
            if(serie.riesgo < 4) {
                insightBox.innerText = insights.bajo;
                document.documentElement.style.setProperty('--accent-color', '#3b82f6');
            } else if(serie.riesgo < 7) {
                insightBox.innerText = insights.optimo;
                document.documentElement.style.setProperty('--accent-color', '#8b5cf6');
            } else if(serie.riesgo < 8.5) {
                insightBox.innerText = insights.peligro;
                document.documentElement.style.setProperty('--accent-color', '#f59e0b');
            } else {
                insightBox.innerText = insights.critico;
                document.documentElement.style.setProperty('--accent-color', '#ef4444');
            }

            radar.data.datasets[0].data = [serie.ifi*5, serie.rpe, (serie.tut/60)*10, serie.riesgo];
            radar.update();

            line.data.labels.push("");
            line.data.datasets[0].data.push(serie.ifi);
            line.update();
        }

        document.getElementById('rpe').oninput = function() { document.getElementById('rpeVal').innerText = this.value; };

        document.getElementById('formVanguardia').onsubmit = function(e) {
            e.preventDefault();
            const carga = document.getElementById('carga').value;
            const tut = document.getElementById('tut').value;
            const rpe = document.getElementById('rpe').value;
            
            const ifi = ((carga / 100) * (tut / 50)).toFixed(2);
            let riesgo = ((ifi * 0.4) + (rpe * 0.6)).toFixed(1);
            if(rpe >= 9 && ifi > 1.2) riesgo = 9.8;

            const nuevaSerie = { ejercicio: document.getElementById('ejercicio').value, ifi, rpe, tut, riesgo };
            historial.push(nuevaSerie);
            localStorage.setItem('vanguardia_series', JSON.stringify(historial));

            actualizarIU(nuevaSerie);
            renderHistorial();

            if(riesgo >= 9) {
                document.getElementById('mensajeAlerta').innerText = `Tu RPE de ${rpe} junto a un IFI de ${ifi} indica que tu sistema nervioso está agotado. La próxima repetición es una rifa para una lesión crónica.`;
                document.getElementById('alertaCritica').classList.add('activa');
            }
        };

        function renderHistorial() {
            const list = document.getElementById('listaSeries');
            list.innerHTML = "";
            [...historial].reverse().forEach(s => {
                list.innerHTML += `
                    <div class="flex justify-between items-center border-b border-white/5 pb-2">
                        <span class="font-bold uppercase text-[10px]">${s.ejercicio}</span>
                        <span class="text-[10px] text-gray-500">IFI: ${s.ifi} | RPE: ${s.rpe}</span>
                        <span class="${s.riesgo >= 8 ? 'text-red-500' : 'text-blue-500'} font-bold">R: ${s.riesgo}</span>
                    </div>`;
            });
        }

        renderHistorial();

        // Cronómetro
        let s = 0;
        setInterval(() => {
            s++;
            const h = String(Math.floor(s/3600)).padStart(2,'0');
            const m = String(Math.floor((s%3600)/60)).padStart(2,'0');
            const sec = String(s%60).padStart(2,'0');
            document.getElementById('reloj').innerText = `${h}:${m}:${sec}`;
        }, 1000);

        function descargarBoveda() {
            let csv = "Ejercicio,IFI,RPE,TUT,Riesgo\n";
            historial.forEach(s => csv += `${s.ejercicio},${s.ifi},${s.rpe},${s.tut},${s.riesgo}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'Vanguardia_Data.csv');
            a.click();
        }
    </script>
</body>
</html>
