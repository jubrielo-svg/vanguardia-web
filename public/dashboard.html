<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguardia | Consola Biométrica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent-color: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #f3f4f6; transition: background 1.5s ease; }
        .ambient-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, var(--accent-color) 0%, transparent 70%); opacity: 0.05; pointer-events: none; z-index: -1; transition: all 1.5s ease; }
        .glass-card { background: rgba(10, 10, 10, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; background: url('data:image/svg+xml;utf8,<svg fill="white" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>') no-repeat right 10px center; }
    </style>
</head>
<body class="min-h-screen">

    <div id="ambient" class="ambient-bg"></div>

    <nav class="p-4 md:p-6 flex justify-between items-center border-b border-white/5 relative z-10">
        <div class="text-xl font-black tracking-tighter uppercase">Vanguardia.</div>
        <div class="flex items-center gap-4">
            <span class="hidden md:block text-[10px] text-gray-500 uppercase tracking-widest border border-white/10 px-2 py-1 rounded">Motor Biomecánico V4</span>
            <button onclick="localStorage.clear(); location.reload();" class="text-[10px] text-red-500 hover:text-white uppercase tracking-widest transition-colors">Purgar Sistema</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        
        <div class="glass-card p-6 rounded-2xl mb-6 border-l-4 border-l-blue-500">
            <h2 class="text-xs font-bold tracking-[0.2em] text-white uppercase mb-1">Calibración de Sistema</h2>
            <div class="grid grid-cols-3 gap-4 mt-4">
                <div>
                    <label class="text-[10px] uppercase text-gray-400">Edad</label>
                    <input type="number" id="bioEdad" value="41" class="w-full bg-black/50 border border-white/10 rounded p-2 text-white text-center focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-gray-400">Estatura (cm)</label>
                    <input type="number" id="bioEstatura" value="169" class="w-full bg-black/50 border border-white/10 rounded p-2 text-white text-center focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-gray-400">Peso (Kg)</label>
                    <input type="number" id="bioPeso" value="85" class="w-full bg-black/50 border border-white/10 rounded p-2 text-white text-center focus:border-blue-500 outline-none">
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 glass-card p-6 md:p-8 rounded-2xl">
                <form id="formVanguardia" class="space-y-6">
                    
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-widest text-white font-bold">Patrón de Movimiento</label>
                        <select id="ejercicioSelector" onchange="toggleEjercicioLibre()" class="w-full bg-black border border-white/10 rounded-lg p-4 text-white focus:border-blue-500 outline-none cursor-pointer">
                            <option value="Prensa">Prensa de Piernas (Tren Inferior)</option>
                            <option value="Sentadilla">Sentadilla Libre (Compuesto Global)</option>
                            <option value="Peso Muerto">Peso Muerto (Cadena Posterior)</option>
                            <option value="Press Banca">Press de Banca (Empuje Horizontal)</option>
                            <option value="Dominadas">Dominadas Lastradas (Tracción Vertical)</option>
                            <option value="Otro" class="text-blue-400 font-bold">▶ Otro (Entrada Manual)</option>
                        </select>
                        <input type="text" id="ejercicioLibre" placeholder="Escribe el ejercicio detallado..." class="hidden w-full mt-2 bg-black/50 border border-blue-500/50 rounded-lg p-4 text-white focus:border-blue-500 outline-none">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase tracking-widest text-white font-bold">Carga Absoluta (Kg)</label>
                            <input type="number" id="carga" required placeholder="Ej: 120" class="w-full bg-transparent border-b border-white/20 py-3 text-2xl focus:border-blue-500 outline-none text-blue-400">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase tracking-widest text-white font-bold">TUT Real (Segundos)</label>
                            <input type="number" id="tut" required placeholder="Ej: 55" class="w-full bg-transparent border-b border-white/20 py-3 text-2xl focus:border-purple-400 outline-none text-purple-400">
                        </div>
                    </div>

                    <div class="space-y-2 pt-4 border-t border-white/5">
                        <div class="flex justify-between">
                            <label class="text-[10px] uppercase tracking-widest text-red-400 font-bold">Fatiga Central (RPE)</label>
                            <span id="rpeVal" class="text-lg font-bold text-red-500">5 / 10</span>
                        </div>
                        <input type="range" id="rpe" min="1" max="10" value="5" class="w-full h-2 bg-gray-800 rounded-lg appearance-none cursor-pointer">
                    </div>

                    <button type="submit" class="w-full py-5 bg-white text-black font-black uppercase tracking-[0.3em] text-xs hover:bg-gray-200 transition-colors rounded">
                        Computar Impacto Relativo
                    </button>
                </form>
            </div>

            <div class="flex flex-col gap-6">
                <div class="glass-card p-6 rounded-2xl flex-grow flex flex-col justify-center">
                    <h2 class="text-xs font-bold tracking-[0.2em] text-gray-500 uppercase mb-4 border-b border-white/5 pb-2">Oráculo Biomecánico</h2>
                    <div id="bioInsight" class="text-sm font-light leading-relaxed text-gray-300">
                        <span class="text-gray-500 italic">Esperando telemetría para generar la receta de supercompensación...</span>
                    </div>
                </div>
                
                <div class="glass-card p-4 rounded-2xl flex items-center justify-center h-48">
                    <canvas id="radarRisk"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Lógica para mostrar/ocultar el campo de ejercicio libre
        function toggleEjercicioLibre() {
            const selector = document.getElementById('ejercicioSelector');
            const libre = document.getElementById('ejercicioLibre');
            if(selector.value === "Otro") {
                libre.classList.remove('hidden');
                libre.required = true;
            } else {
                libre.classList.add('hidden');
                libre.required = false;
            }
        }

        // CONFIGURACIÓN RADAR
        const ctxRadar = document.getElementById('radarRisk').getContext('2d');
        const radar = new Chart(ctxRadar, {
            type: 'radar',
            data: {
                labels: ['Carga/Peso', 'RPE', 'TUT', 'Edad/SNC'],
                datasets: [{ data: [0,0,0,0], backgroundColor: 'rgba(59, 130, 246, 0.2)', borderColor: '#3b82f6', borderWidth: 2, pointRadius: 0 }]
            },
            options: { scales: { r: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { display: false, min: 0, max: 10 }, pointLabels: { color: '#666', font: { size: 9 } } } }, plugins: { legend: { display: false } } }
        });

        document.getElementById('rpe').oninput = function() { document.getElementById('rpeVal').innerText = this.value + ' / 10'; };

        document.getElementById('formVanguardia').onsubmit = function(e) {
            e.preventDefault();
            
            // Recolectar Datos
            const peso = parseFloat(document.getElementById('bioPeso').value) || 85;
            const edad = parseFloat(document.getElementById('bioEdad').value) || 41;
            
            // Validar si es ejercicio de la lista o manual
            let ejercicio = document.getElementById('ejercicioSelector').value;
            if(ejercicio === "Otro") ejercicio = document.getElementById('ejercicioLibre').value;

            const carga = parseFloat(document.getElementById('carga').value);
            const tut = parseFloat(document.getElementById('tut').value);
            const rpe = parseFloat(document.getElementById('rpe').value);
            
            // MOTOR MATEMÁTICO
            const cargaRelativa = carga / peso; 
            const factorEdad = edad > 35 ? (edad - 35) * 0.05 : 0; 
            let riesgo = ((cargaRelativa * 2) + (rpe * 0.5) + (tut/60) + factorEdad).toFixed(1);
            if (riesgo > 10) riesgo = 10;

            // CÁLCULO DE REPS (Asumiendo ~5 seg por repetición controlada en Alta Intensidad)
            const repeticionesEstimadas = Math.max(1, Math.round(tut / 5));

            // EL ORÁCULO 2.0 (Generación de Receta)
            const insightBox = document.getElementById('bioInsight');
            let diagnostico = "";
            let receta = "";

            if(riesgo < 4) {
                // REGULAR / INFRADOSIS
                document.documentElement.style.setProperty('--accent-color', '#3b82f6');
                radar.data.datasets[0].borderColor = '#3b82f6';
                radar.data.datasets[0].backgroundColor = 'rgba(59, 130, 246, 0.2)';
                
                diagnostico = `<span class="text-blue-400 font-bold block mb-2 text-base">ESTADO: INFRADOSIS (Mediocre)</span>
                               El estímulo es insuficiente para tu biometría. Estás quemando calorías, no creando tejido.`;
                receta = `<div class="mt-4 bg-black/50 p-3 rounded border border-blue-900/50 text-[11px] uppercase tracking-widest space-y-2">
                            <div class="flex justify-between"><span>TUT Efectivo:</span><span class="text-white">${tut}s (Falta Tensión)</span></div>
                            <div class="flex justify-between"><span>Prescripción:</span><span class="text-white">3-4 Series (Volumen Basura)</span></div>
                            <div class="flex justify-between"><span>Descanso:</span><span class="text-white">60 seg</span></div>
                            <div class="text-blue-400 font-bold mt-2 pt-2 border-t border-white/5">Acción: Sube el RPE a 7 mínimo.</div>
                          </div>`;
                          
            } else if(riesgo < 7.5) {
                // BUENO / ÓPTIMO (Alta Intensidad / Protocolo ICU)
                document.documentElement.style.setProperty('--accent-color', '#a855f7');
                radar.data.datasets[0].borderColor = '#a855f7';
                radar.data.datasets[0].backgroundColor = 'rgba(168, 85, 247, 0.2)';
                
                diagnostico = `<span class="text-purple-400 font-bold block mb-2 text-base">ESTADO: ESTÍMULO DE ÉLITE</span>
                               Has alcanzado el umbral hipertrófico perfecto. Tu ratio de Carga (${cargaRelativa.toFixed(1)}x tu peso) es óptimo.`;
                receta = `<div class="mt-4 bg-black/50 p-3 rounded border border-purple-900/50 text-[11px] uppercase tracking-widest space-y-2">
                            <div class="flex justify-between"><span>Reps Controladas:</span><span class="text-white">Aprox. ${repeticionesEstimadas} reps</span></div>
                            <div class="flex justify-between"><span>Prescripción:</span><span class="text-white">1-2 Series al Fallo</span></div>
                            <div class="flex justify-between"><span>Descanso:</span><span class="text-white">120 - 180 seg (Recuperación ATP)</span></div>
                            <div class="text-purple-400 font-bold mt-2 pt-2 border-t border-white/5">Acción: Mantén la técnica. No añadas series basura.</div>
                          </div>`;
                          
            } else {
                // MALO / PELIGRO FASCIAL
                document.documentElement.style.setProperty('--accent-color', '#ef4444');
                radar.data.datasets[0].borderColor = '#ef4444';
                radar.data.datasets[0].backgroundColor = 'rgba(239, 68, 68, 0.2)';
                
                diagnostico = `<span class="text-red-500 font-bold block mb-2 text-base">ESTADO: RIESGO FASCIAL CRÍTICO</span>
                               Tu SNC está colapsando. Un RPE de ${rpe} frenará la hipertrofia y disparará el cortisol.`;
                receta = `<div class="mt-4 bg-black/50 p-3 rounded border border-red-900/50 text-[11px] uppercase tracking-widest space-y-2">
                            <div class="flex justify-between"><span>Estrés Acumulado:</span><span class="text-white">Severo</span></div>
                            <div class="flex justify-between"><span>Prescripción:</span><span class="text-red-400 font-bold">0 Series Adicionales</span></div>
                            <div class="flex justify-between"><span>Descanso:</span><span class="text-white">48 - 72 Horas</span></div>
                            <div class="text-red-500 font-bold mt-2 pt-2 border-t border-white/5">Acción: Aborta el ejercicio. Inicia supercompensación.</div>
                          </div>`;
            }

            insightBox.innerHTML = diagnostico + receta;

            // Actualizar Radar
            radar.data.datasets[0].data = [Math.min(cargaRelativa * 3, 10), rpe, Math.min((tut/60)*10, 10), Math.min(factorEdad * 5, 10)];
            radar.update();
        };
    </script>
</body>
</html>
