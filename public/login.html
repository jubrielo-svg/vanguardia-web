<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguardia | Acceso Restringido</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030303; color: #f3f4f6; overflow: hidden; user-select: none; }
        .glass-panel { background: rgba(10, 10, 10, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); }
        
        /* Animaciones Tácticas */
        .pin-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #374151; transition: all 0.2s ease; }
        .pin-dot.filled { background-color: #3b82f6; border-color: #3b82f6; box-shadow: 0 0 10px #3b82f6; }
        .pin-dot.error { background-color: #ef4444; border-color: #ef4444; box-shadow: 0 0 15px #ef4444; }
        
        .keypad-btn { transition: all 0.1s ease; }
        .keypad-btn:active { background-color: rgba(255, 255, 255, 0.2); transform: scale(0.95); }

        .shake { animation: shakeError 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeError { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }

        /* Escáner Visual */
        .scanner-line { width: 100%; height: 2px; background: #3b82f6; box-shadow: 0 0 10px #3b82f6; position: absolute; top: 0; animation: scan 2s infinite linear; opacity: 0.5; }
        @keyframes scan { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center relative">

    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-blue-900/10 via-black to-black z-0 pointer-events-none"></div>

    <main class="w-full max-w-sm px-6 relative z-10 flex flex-col items-center">
        
        <div class="text-center mb-10">
            <h1 class="text-2xl font-black tracking-[0.4em] uppercase text-white mb-2">Vanguardia.</h1>
            <p class="text-[9px] text-red-500 uppercase tracking-widest font-bold flex items-center justify-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>
                Protocolo de Seguridad Activo
            </p>
        </div>

        <div class="glass-panel w-full rounded-3xl p-8 flex flex-col items-center mb-8 relative overflow-hidden" id="authBox">
            
            <div class="w-16 h-16 mb-8 relative opacity-50">
                <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full">
                    <path d="M12 2a10 10 0 0 0-10 10c0 5.523 4.477 10 10 10s10-4.477 10-10A10 10 0 0 0 12 2z"></path>
                    <path d="M12 6a6 6 0 0 0-6 6c0 3.314 2.686 6 6 6s6-2.686 6-6a6 6 0 0 0-6-6z"></path>
                    <path d="M12 10a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"></path>
                </svg>
                <div class="scanner-line"></div>
            </div>

            <h2 class="text-[10px] text-gray-400 uppercase tracking-[0.2em] mb-6" id="statusText">Ingresa Credenciales</h2>

            <div class="flex gap-4 mb-4">
                <div class="pin-dot" id="dot-1"></div>
                <div class="pin-dot" id="dot-2"></div>
                <div class="pin-dot" id="dot-3"></div>
                <div class="pin-dot" id="dot-4"></div>
            </div>
        </div>

        <div class="w-full max-w-[280px] grid grid-cols-3 gap-4">
            <button class="keypad-btn glass-panel h-16 rounded-2xl text-2xl text-white font-light" onclick="pressKey('1')">1</button>
            <button class="keypad-btn glass-panel h-16 rounded-2xl text-2xl text-white font-light" onclick="pressKey('2')">2</button>
            <button class="keypad-btn glass-panel h-16 rounded-2xl text-2xl text-white font-light" onclick="pressKey('3')">3</button>
            <button class="keypad-btn glass-panel h-16 rounded-2xl text-2xl text-white font-light" onclick="pressKey('4')">4</button>
            <button class="keypad-btn glass-panel h-16 rounded-2xl text-2xl text-white font-light" onclick="pressKey('5')">5</button>
            <button class="keypad-btn glass-panel h-16 rounded-2xl text-2xl text-white font-light" onclick="pressKey('6')">6</button>
            <button class="keypad-btn glass-panel h-16 rounded-2xl text-2xl text-white font-light" onclick="pressKey('7')">7</button>
            <button class="keypad-btn glass-panel h-16 rounded-2xl text-2xl text-white font-light" onclick="pressKey('8')">8</button>
            <button class="keypad-btn glass-panel h-16 rounded-2xl text-2xl text-white font-light" onclick="pressKey('9')">9</button>
            <button class="keypad-btn h-16 rounded-2xl text-gray-600 font-bold tracking-widest text-[10px] uppercase" onclick="resetPin()">Borrar</button>
            <button class="keypad-btn glass-panel h-16 rounded-2xl text-2xl text-white font-light" onclick="pressKey('0')">0</button>
            <button class="keypad-btn h-16 rounded-2xl text-gray-800" disabled></button> </div>

    </main>

    <script>
        // 1. MOTOR DE AUDIO SINTÉTICO Y HÁPTICA
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        const TacticoSensorial = {
            init: function() {
                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            },
            vibrar: function(patron) { if (navigator.vibrate) navigator.vibrate(patron); },
            tick: function() {
                this.init();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(1000, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
                this.vibrar(15);
            },
            accesoConcedido: function() {
                this.init();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                this.vibrar([30, 50, 30]);
            },
            alarma: function() {
                this.init();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                this.vibrar([100, 50, 100, 50, 200]);
            }
        };

        // 2. LÓGICA DEL TECLADO
        let currentPin = "";
        const PIN_CORRECTO = "2026"; // TU PIN MAESTRO

        function pressKey(num) {
            TacticoSensorial.tick(); // Sonido al tocar tecla
            
            if (currentPin.length < 4) {
                currentPin += num;
                document.getElementById(`dot-${currentPin.length}`).classList.add('filled');
            }

            if (currentPin.length === 4) {
                verificarPin();
            }
        }

        function resetPin() {
            currentPin = "";
            for(let i=1; i<=4; i++) {
                const dot = document.getElementById(`dot-${i}`);
                dot.className = "pin-dot"; // Resetear clases
            }
            document.getElementById('statusText').innerText = "Ingresa Credenciales";
            document.getElementById('statusText').className = "text-[10px] text-gray-400 uppercase tracking-[0.2em] mb-6";
        }

        function verificarPin() {
            const authBox = document.getElementById('authBox');
            const statusText = document.getElementById('statusText');

            if (currentPin === PIN_CORRECTO) {
                // ACCESO CONCEDIDO
                TacticoSensorial.accesoConcedido();
                statusText.innerText = "ACCESO AUTORIZADO";
                statusText.className = "text-[10px] text-green-400 uppercase tracking-[0.2em] mb-6 font-bold";
                
                // Conceder llave criptográfica local y redirigir
                localStorage.setItem('vanguardia_auth', 'true');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800);

            } else {
                // ACCESO DENEGADO
                TacticoSensorial.alarma();
                statusText.innerText = "CREDENCIALES INVÁLIDAS";
                statusText.className = "text-[10px] text-red-500 uppercase tracking-[0.2em] mb-6 font-bold";
                
                // Efecto visual de error
                for(let i=1; i<=4; i++) { document.getElementById(`dot-${i}`).classList.add('error'); }
                authBox.classList.add('shake');
                
                // Limpiar después del error
                setTimeout(() => {
                    authBox.classList.remove('shake');
                    resetPin();
                }, 600);
            }
        }
    </script>
</body>
</html>
