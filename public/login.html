<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguardia | Acceso Restringido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #f3f4f6; }
        .glow-input:focus { box-shadow: 0 0 20px rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full text-center">
        <div class="text-2xl font-bold tracking-widest uppercase text-white mb-12">Vanguardia.</div>
        
        <div class="bg-gray-900/40 p-8 rounded-2xl border border-gray-800 backdrop-blur-xl">
            <h1 class="text-sm uppercase tracking-[0.3em] text-gray-500 mb-8">Credencial de Élite</h1>
            
            <form id="loginForm" class="space-y-6">
                <input type="password" id="pinInput" placeholder="••••" maxlength="4" required
                    class="w-full bg-black border border-gray-800 rounded-xl py-4 text-center text-3xl tracking-[0.5em] text-white focus:outline-none focus:border-white transition-all glow-input">
                
                <button type="submit" 
                    class="w-full bg-white text-black font-bold py-4 rounded-xl uppercase tracking-widest text-sm hover:bg-gray-200 transition-all">
                    Verificar Identidad
                </button>
            </form>
            <p id="errorMsg" class="mt-4 text-red-500 text-xs uppercase tracking-widest hidden">Acceso Denegado</p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const pin = document.getElementById('pinInput').value;
            
            // LA LLAVE MAESTRA: Cambia '2026' por tu PIN deseado
            if (pin === '2026') {
                localStorage.setItem('vanguardia_auth', 'true');
                window.location.href = 'dashboard.html';
            } else {
                const error = document.getElementById('errorMsg');
                error.classList.remove('hidden');
                document.getElementById('pinInput').value = '';
                setTimeout(() => error.classList.add('hidden'), 2000);
            }
        });
    </script>
</body>
</html>
